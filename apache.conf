<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Wrap headers in a guard block to prevent startup syntax errors
        <IfModule mod_headers.c>
            Header set Access-Control-Allow-Origin "https://books-frontend-ashen.vercel.app/"
            Header set Access-Control-Allow-Headers "X-Requested-With, Content-Type, Accept, Origin, Authorization"
            Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
            Header set Access-Control-Allow-Credentials "true"
        </IfModule>

        # Handle OPTIONS preflight requests instantly
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ - [R=200,L]
    </Directory>
</VirtualHost>